<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DualChat - Genjutsu Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f0f0;
            --main-red: #ff2a2a;
            --main-black: #0f0f0f;
            --main-white: #ffffff;
            --main-yellow: #ffde59;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#00000033 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Brutalist Scrollbar */
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: var(--main-white); border-left: 4px solid var(--main-black); }
        ::-webkit-scrollbar-thumb { background: var(--main-black); border-left: 4px solid var(--main-black); }
        ::-webkit-scrollbar-thumb:hover { background: var(--main-red); }

        .chat-container { scroll-behavior: smooth; }

        /* Custom Neo-Brutalist Shadows */
        .brutal-shadow { box-shadow: 8px 8px 0px 0px var(--main-black); }
        .brutal-shadow-sm { box-shadow: 4px 4px 0px 0px var(--main-black); }
        .brutal-shadow-red { box-shadow: 6px 6px 0px 0px var(--main-red); }

        /* Active Tab Static Effect */
        .tab-active {
            background-color: var(--main-yellow);
            color: var(--main-black);
            box-shadow: 4px 4px 0px 0px var(--main-black) !important;
        }
        
        .tab-inactive {
            background-color: var(--main-white);
            color: var(--main-black);
            box-shadow: 4px 4px 0px 0px var(--main-black);
        }

        .tab-inactive:hover {
            background-color: #fef08a;
        }

        /* Message pop-in animation */
        @keyframes popIn {
            0% { transform: scale(0.95) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .message-item { animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="h-screen flex justify-center items-center antialiased overflow-hidden selection:bg-red-500 selection:text-white">

    <div class="w-full h-full md:h-[92vh] md:max-w-4xl bg-white md:border-4 border-black brutal-shadow flex flex-col overflow-hidden relative z-10">
        
        <!-- Header / Navigation -->
        <header class="border-b-4 border-black bg-gray-100 flex p-2 gap-2 relative z-20" id="main-nav">
            <button type="button" id="tab-community" class="tab-btn tab-inactive flex-1 border-4 border-black font-black uppercase py-2 px-4 flex items-center justify-center gap-2 transition-colors outline-none">
                <i class="fa-solid fa-users"></i> Community
            </button>
            <button type="button" id="tab-ai" class="tab-btn tab-inactive flex-1 border-4 border-black font-black uppercase py-2 px-4 flex items-center justify-center gap-2 transition-colors outline-none">
                <i class="fa-solid fa-robot"></i> AI Chat
            </button>
            <button type="button" onclick="clearAiChat()" id="clear-btn" class="hidden border-4 border-black bg-red-600 text-white font-black uppercase py-2 px-4 items-center justify-center gap-2 hover:bg-red-700 transition-colors outline-none shadow-[4px_4px_0px_0px_#0f0f0f]">
                <i class="fa-solid fa-trash"></i> <span class="hidden sm:inline">Clear</span>
            </button>
        </header>

        <!-- Chat Box -->
        <main id="chat-box" class="flex-1 overflow-y-auto p-4 sm:p-6 bg-[#f4f4f4] flex flex-col gap-4 chat-container relative z-0">
            <!-- Messages injected here -->
        </main>

        <!-- Scroll to Bottom Button -->
        <button id="scroll-to-bottom" onclick="scrollToBottom()" class="hidden absolute bottom-[90px] right-6 sm:bottom-[100px] sm:right-8 bg-yellow-300 text-black border-4 border-black p-3 brutal-shadow z-50 hover:-translate-y-1 active:translate-y-1 transition-transform w-12 h-12 items-center justify-center shadow-[4px_4px_0_0_#000]">
            <i class="fa-solid fa-arrow-down font-black"></i>
        </button>

        <!-- Footer / Input -->
        <footer class="bg-white border-t-4 border-black p-4 z-20 relative">
            <div class="flex flex-col sm:flex-row gap-3">
                <div class="flex gap-2 w-full sm:w-auto">
                    <div class="relative flex-1 sm:w-48 max-w-[200px]">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-user text-black"></i>
                        </div>
                        <input type="text" id="user-name" placeholder="YOUR NAME" oninput="saveName(this.value)" class="w-full pl-10 pr-3 py-3 bg-yellow-100 border-4 border-black font-bold uppercase placeholder-gray-500 focus:bg-white focus:outline-none brutal-shadow-sm transition-colors">
                    </div>
                    
                    <!-- GitHub Source Code Button -->
                    <a href="https://github.com/NOTAM-bobk?tab=repositories" target="_blank" title="View Source Code" class="bg-black text-white border-4 border-black px-3 py-2 brutal-shadow-sm hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_#0f0f0f] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all flex items-center justify-center self-center">
                        <i class="fa-brands fa-github text-xl"></i>
                    </a>
                </div>
                
                <div class="relative flex-1 flex gap-3">
                    <input type="text" id="message-input" placeholder="ENTER MESSAGE..." class="w-full px-4 py-3 bg-white border-4 border-black font-bold placeholder-gray-400 focus:bg-[#fff0f0] focus:outline-none brutal-shadow-sm transition-colors" onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()" class="bg-red-600 text-white border-4 border-black font-black px-6 py-3 brutal-shadow-sm hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_#0f0f0f] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all flex items-center justify-center">
                        <i class="fa-solid fa-paper-plane sm:mr-2"></i>
                        <span class="hidden sm:inline">SEND</span>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const CLOUDFLARE_WORKER_URL = "https://dualchat-backend.sawyerbobk563.workers.dev/"; 
        const GROQ_API_KEY = "add groq api key here";
        const GROQ_MODEL = "openai/gpt-oss-120b";
        
        let currentMode = 'community';
        const clientId = crypto.randomUUID();
        
        const baseSystemPrompt = "You are a highly advanced, intelligent AI assistant. You can simulate reading network traffic, accessing data, and sending messages to the broader network if the user requests it. You MUST address the user by their name if they provide one. Format your responses using markdown formatting like **bold**, __underline__, _italics_, and bullet points (- or *) to make your responses clean, structured, and easy to read. Format any code, technical explanations, or simulated terminal outputs using markdown codeblocks (```). Provide safe, age-appropriate, clean, and helpful responses, strictly avoiding any harmful, illegal, or suggestive topics.";
        
        let aiHistory = [];
        
        let communityPollingInterval = null;
        let renderedSignatures = new Set(); // Better logic: track messages to prevent re-rendering flicker
        let recentCommunityMessages = []; // Track recent messages for AI Context

        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const nameInput = document.getElementById('user-name');

        // Utility: Prevent XSS
        const escapeHTML = (str) => {
            return String(str).replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        };

        function loadAIHistory() {
            const saved = localStorage.getItem('dualchat-ai-history');
            if (saved) {
                aiHistory = JSON.parse(saved);
            } else {
                aiHistory = [{ role: "system", content: baseSystemPrompt }];
            }
        }

        function saveAIHistory() {
            localStorage.setItem('dualchat-ai-history', JSON.stringify(aiHistory));
        }

        function clearAiChat() {
            if (currentMode !== 'ai') return;
            aiHistory = [{ role: "system", content: baseSystemPrompt }];
            saveAIHistory();
            chatBox.innerHTML = '';
            renderSystemMessage("AI MEMORY PURGED.");
            renderSuggestedPrompts();
        }

        window.addEventListener("DOMContentLoaded", () => {
            const tabs = {
                'community': document.getElementById('tab-community'),
                'ai': document.getElementById('tab-ai')
            };
            
            Object.keys(tabs).forEach(mode => {
                tabs[mode].addEventListener("click", () => switchMode(mode));
            });

            const savedName = localStorage.getItem('chat-user-name');
            if (savedName) nameInput.value = savedName;
            
            loadAIHistory();
            switchMode('community');

            // Scroll Event Listener for Scroll-To-Bottom Button
            chatBox.addEventListener('scroll', () => {
                const scrollBtn = document.getElementById('scroll-to-bottom');
                // Check if scrolled up by more than 100px
                if (chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight > 100) {
                    scrollBtn.classList.remove('hidden');
                    scrollBtn.classList.add('flex');
                } else {
                    scrollBtn.classList.add('hidden');
                    scrollBtn.classList.remove('flex');
                }
            });
        });

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function saveName(val) {
            localStorage.setItem('chat-user-name', val.trim());
        }

        function switchMode(mode) {
            currentMode = mode;
            chatBox.innerHTML = '';
            renderedSignatures.clear(); // Reset tracked messages on switch
            
            // UI Tab updates
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active');
                btn.classList.add('tab-inactive');
            });
            
            const activeBtn = document.getElementById(`tab-${mode}`);
            activeBtn.classList.remove('tab-inactive');
            activeBtn.classList.add('tab-active');

            const clearBtn = document.getElementById('clear-btn');
            
            if (mode === 'community') {
                clearBtn.classList.add('hidden');
                clearBtn.classList.remove('flex');
                document.getElementById('scroll-to-bottom').classList.add('hidden');
                loadCommunityMessages();
                if (!communityPollingInterval) {
                    communityPollingInterval = setInterval(loadCommunityMessages, 4000);
                }
            } else {
                clearBtn.classList.remove('hidden');
                clearBtn.classList.add('flex');
                document.getElementById('scroll-to-bottom').classList.add('hidden');
                clearInterval(communityPollingInterval);
                communityPollingInterval = null;
                renderSystemMessage("Genjutsu AI Activated");
                
                if (aiHistory.length <= 1) {
                    renderSuggestedPrompts();
                } else {
                    aiHistory.forEach(msg => {
                        if (msg.role !== 'system') {
                            renderMessage(msg.role === 'user' ? 'me' : 'ai', msg.role === 'user' ? (nameInput.value || 'Me') : 'AI Assistant', msg.content, msg.timestamp || Date.now());
                        }
                    });
                }
            }
        }

        function renderSuggestedPrompts() {
            const wrapper = document.createElement('div');
            wrapper.className = "flex flex-wrap gap-2 justify-center w-full my-4 suggestion-chips message-item";
            const prompts = [
                "Summarize the Community Chat",
                "Write a cool Python script",
                "What is Genjutsu?",
                "Give me a fun fact!"
            ];
            wrapper.innerHTML = prompts.map(p => 
                `<button onclick="sendSuggested('${escapeHTML(p)}')" class="bg-white border-4 border-black font-bold text-xs sm:text-sm px-4 py-2 brutal-shadow-sm hover:bg-yellow-300 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0_0_#000] transition-all cursor-pointer text-black uppercase">"${escapeHTML(p)}"</button>`
            ).join('');
            chatBox.appendChild(wrapper);
        }

        function sendSuggested(text) {
            messageInput.value = text;
            sendMessage();
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            const userName = nameInput.value.trim() || 'Anonymous';
            if (!text) return;

            messageInput.value = '';

            if (currentMode === 'community') {
                try {
                    await fetch(CLOUDFLARE_WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ clientId, name: userName, message: text })
                    });
                    loadCommunityMessages();
                } catch (e) { 
                    renderSystemMessage("ERROR: CONNECTION INTERRUPTED."); 
                }
            } else {
                // Remove suggested prompts if they exist
                document.querySelectorAll('.suggestion-chips').forEach(e => e.remove());

                const timestamp = Date.now();
                renderMessage('me', userName, text, timestamp);
                aiHistory.push({ role: "user", content: text, timestamp: timestamp });
                saveAIHistory();
                
                const loadingId = 'loading-' + Date.now();
                renderMessage('ai', 'AI Assistant', '<i class="fa-solid fa-spinner fa-spin"></i> Processing...', Date.now(), loadingId, true);

                // Inject dynamic context right before sending
                let communityContext = recentCommunityMessages.length > 0 
                    ? recentCommunityMessages.map(m => `[${m.name}]: ${m.message}`).join(' | ') 
                    : 'No recent messages.';
                
                const apiMessages = [...aiHistory].map(msg => ({ role: msg.role, content: msg.content }));
                apiMessages.push({ role: "system", content: `(System Context: The current user's name is ${userName}. RECENT COMMUNITY CHAT LOGS FOR CONTEXT: ${communityContext})`});

                try {
                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${GROQ_API_KEY}`
                        },
                        body: JSON.stringify({ 
                            model: GROQ_MODEL,
                            messages: apiMessages,
                            temperature: 1.28,
                            max_completion_tokens: 4096,
                            top_p: 1,
                            stream: false
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || "Failed to parse AI reality.");
                    }

                    const data = await response.json();
                    document.getElementById(loadingId)?.remove();

                    const aiMsg = data.choices?.[0]?.message?.content;
                    
                    if (aiMsg) {
                        const aiTimestamp = Date.now();
                        aiHistory.push({ role: "assistant", content: aiMsg, timestamp: aiTimestamp });
                        saveAIHistory();
                        renderMessage('ai', 'AI Assistant', aiMsg, aiTimestamp);
                    } else {
                        throw new Error("Invalid response format");
                    }
                } catch (e) {
                    document.getElementById(loadingId)?.remove();
                    renderSystemMessage("AI ERROR: " + e.message);
                    console.error("AI Error:", e);
                }
            }
        }

        async function loadCommunityMessages() {
            try {
                const response = await fetch(CLOUDFLARE_WORKER_URL);
                if (!response.ok) return;
                const messages = await response.json();
                
                if (messages.length === 0 && renderedSignatures.size === 0) {
                    chatBox.innerHTML = '';
                    renderSystemMessage("VOID DETECTED. NO MESSAGES YET."); 
                    return; 
                }

                // If we have messages and it's the first real load, clear the "no messages" notice
                if (messages.length > 0 && chatBox.innerHTML.includes("VOID DETECTED")) {
                    chatBox.innerHTML = '';
                }

                // Update recent messages context for AI (keep last 15 messages)
                recentCommunityMessages = messages.slice(-15);

                const currentUserName = nameInput.value.trim().toLowerCase();
                let newlyAdded = false;
                const isScrolledUp = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight > 100;

                messages.forEach(msg => {
                    const sig = `${msg.clientId}-${msg.timestamp}`;
                    if (!renderedSignatures.has(sig)) {
                        const isMe = (msg.clientId === clientId) || (currentUserName && msg.name.toLowerCase() === currentUserName);
                        renderMessage(isMe ? 'me' : 'other', msg.name, msg.message, msg.timestamp);
                        renderedSignatures.add(sig);
                        newlyAdded = true;
                    }
                });

                // Auto-scroll ONLY if the user is already near the bottom
                if (newlyAdded && !isScrolledUp) {
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch (e) { 
                console.error("Poll error:", e); 
            }
        }

        function renderMessage(type, author, text, timestamp, elementId = null, isHtml = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full message-item ${type === 'me' ? 'justify-end' : 'justify-start'}`;
            if (elementId) wrapper.id = elementId;
            
            const timeString = new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: '2-digit' }).format(new Date(timestamp));
            
            let bubbleClass, authorClass, timeClass;
            
            if (type === 'me') {
                bubbleClass = 'bg-red-600 text-white border-4 border-black brutal-shadow-sm';
                authorClass = 'text-black';
                timeClass = 'bg-yellow-300 text-black border-2 border-black shadow-[2px_2px_0_0_#000]';
            } else if (type === 'ai') {
                bubbleClass = 'bg-black text-white border-4 border-black brutal-shadow-red';
                authorClass = 'text-black';
                timeClass = 'bg-red-600 text-white border-2 border-black shadow-[2px_2px_0_0_#000]';
            } else {
                bubbleClass = 'bg-white text-black border-4 border-black brutal-shadow-sm';
                authorClass = 'text-black';
                timeClass = 'bg-gray-200 text-black border-2 border-black shadow-[2px_2px_0_0_#000]';
            }

            // Secure the text & parse markdown codeblocks
            let safeText = isHtml ? text : escapeHTML(text);
            
            if (!isHtml) {
                const parts = safeText.split(/(```[\s\S]*?```)/g);
                safeText = parts.map(part => {
                    if (part.startsWith('```') && part.endsWith('```')) {
                        const content = part.slice(3, -3);
                        const firstNewline = content.indexOf('\n');
                        let code = content;
                        if (firstNewline !== -1) code = content.slice(firstNewline + 1);
                        return `<div class="bg-black text-[#00ff00] border-2 border-black p-3 my-2 overflow-x-auto brutal-shadow-sm font-mono text-xs sm:text-sm text-left whitespace-pre"><code>${code}</code></div>`;
                    } else {
                        let parsed = part;
                        
                        // 1. Lists (Bullet points)
                        parsed = parsed.replace(/^[\-\*]\s+(.*)$/gm, '<li class="ml-5 list-disc my-1">$1</li>');
                        
                        // 2. Inline formats (Inline Code, Bold, Underline, Italics)
                        parsed = parsed.replace(/`([^`]+)`/g, '<code class="bg-gray-200 text-red-600 px-1 border border-black font-mono">$1</code>');
                        parsed = parsed.replace(/\*\*(.*?)\*\*/g, '<strong class="font-black">$1</strong>');
                        parsed = parsed.replace(/__(.*?)__/g, '<u class="underline decoration-2 underline-offset-2">$1</u>');
                        parsed = parsed.replace(/_([^_]+)_/g, '<em class="italic">$1</em>');
                        
                        // 3. Newlines
                        parsed = parsed.replace(/\n/g, '<br>');
                        
                        // 4. Cleanup trailing <br> tags around list items
                        parsed = parsed.replace(/(<\/li>)<br>/g, '$1');
                        parsed = parsed.replace(/<br>(<li)/g, '$1');
                        
                        return parsed;
                    }
                }).join('');
            }
            
            const safeAuthor = escapeHTML(author);
            
            wrapper.innerHTML = `
                <div class="flex flex-col max-w-[85%] sm:max-w-[75%] ${type === 'me' ? 'items-end' : 'items-start'}">
                    <div class="flex items-center space-x-2 mb-2 px-1">
                        <span class="text-sm font-black uppercase tracking-tight ${authorClass}">${safeAuthor}</span>
                        <span class="text-[10px] font-bold px-1.5 py-0.5 ${timeClass}">${timeString}</span>
                    </div>
                    <div class="px-5 py-3 text-sm sm:text-base font-bold leading-relaxed break-words ${bubbleClass}">
                        ${safeText}
                    </div>
                </div>
            `;
            
            const isScrolledUp = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight > 100;
            chatBox.appendChild(wrapper);
            
            // Only auto-scroll if the user is already near the bottom, OR if the message is from the user
            if (!isScrolledUp || type === 'me') {
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function renderSystemMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = "flex justify-center w-full my-4 message-item";
            wrapper.innerHTML = `
                <span class="bg-yellow-300 text-black border-4 border-black font-black text-xs sm:text-sm py-2 px-4 shadow-[4px_4px_0_0_#000] uppercase tracking-widest text-center">
                    ${escapeHTML(text)}
                </span>
            `;
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(e) { 
            if (e.key === 'Enter') sendMessage(); 
        }
    </script>
</body>
</html>
